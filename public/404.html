<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store the path and redirect to index.html
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.split('/').slice(0, 2).join('/').length) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
</html>
